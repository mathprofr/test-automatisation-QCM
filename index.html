<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interface Quiz GitHub</title>
    <style>
        /* Base de mise en page */
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        #quiz-wrapper { max-width: 600px; width: 100%; border: 1px solid #ddd; padding: 20px; border-radius: 8px; }

        /* Styles des choix (états propres) */
        .choice { 
            padding: 15px; 
            margin-bottom: 10px; 
            border: 2px solid #eee; 
            border-radius: 5px; 
            transition: 0.2s;
        }

        /* Correction du bug : On sépare bien les états */
        .choice.correct { 
            background-color: #d4edda; 
            border-color: #28a745; 
            color: #155724; 
        }

        .choice.wrong { 
            background-color: #f8d7da; 
            border-color: #dc3545; 
            color: #721c24; 
        }

        .choice.disabled { 
            pointer-events: none; 
            opacity: 0.8; 
        }
    </style>
</head>
<body>

    <div id="quiz-wrapper">
        <div id="loader">Connexion à GitHub en cours...</div>

        <div id="quiz-content" style="display:none;">
            <h2 id="question-title"></h2>
            
            <div id="choices-list">
                </div>

            <hr>
            <div id="score-board">Score : <span id="current-score">0</span></div>
        </div>
    </div>

</body>
</html>
