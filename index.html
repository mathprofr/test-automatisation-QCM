<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Engine IA</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050508;
            --surface: #0f0f17;
            --surface-light: #161621;
            --accent: #7c6aff;
            --accent-glow: rgba(124, 106, 255, 0.3);
            --accent2: #ff6a9e;
            --accent3: #6affd4;
            --text: #e8e8f0;
            --muted: #6b6b80;
            --correct: #2dff9e;
            --wrong: #ff4d6d;
            --border: rgba(124, 106, 255, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'DM Mono', monospace; 
            min-height: 100vh; 
            overflow-x: hidden; 
        }

        .bg-glow {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background: 
                radial-gradient(circle at 10% 10%, rgba(124,106,255,0.05) 0%, transparent 50%),
                radial-gradient(circle at 90% 90%, rgba(255,106,158,0.03) 0%, transparent 50%);
        }

        .container { max-width: 720px; margin: 0 auto; padding: 40px 20px; position: relative; z-index: 1; }

        /* --- Welcome Screen --- */
        #welcome-screen {
            position: fixed; inset: 0; background: var(--bg); z-index: 2000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #welcome-screen.hide { opacity: 0; pointer-events: none; }
        
        .welcome-title {
            font-family: 'Syne', sans-serif; font-size: 32px; font-weight: 800; margin-bottom: 12px;
            background: linear-gradient(135deg, #fff, var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .welcome-sub { color: var(--muted); font-size: 13px; margin-bottom: 30px; }

        /* --- Header & Tabs --- */
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; color: #fff; margin-top: 10px; }
        .badge { font-size: 10px; text-transform: uppercase; letter-spacing: 0.2em; color: var(--accent); border: 1px solid var(--accent); padding: 4px 12px; border-radius: 20px; }

        .tabs { display: flex; gap: 8px; background: var(--surface); padding: 6px; border-radius: 12px; margin-bottom: 30px; border: 1px solid var(--border); }
        .tab { flex: 1; padding: 12px; background: none; border: none; color: var(--muted); font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; border-radius: 8px; transition: 0.3s; }
        .tab.active { background: var(--accent); color: white; box-shadow: 0 4px 15px var(--accent-glow); }

        /* --- Cards --- */
        .card-lobby {
            background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
            padding: 50px 30px; text-align: center; animation: zoomIn 0.5s ease;
        }
        .lobby-icon { font-size: 40px; margin-bottom: 20px; display: block; }
        .lobby-title { font-family: 'Syne', sans-serif; font-size: 22px; margin-bottom: 10px; color: white; }
        .lobby-stats { color: var(--muted); font-size: 14px; margin-bottom: 35px; }

        .question-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 30px; animation: slideUp 0.4s ease; }
        .q-meta { font-size: 11px; color: var(--accent); margin-bottom: 15px; letter-spacing: 0.1em; }
        .q-text { font-family: 'Syne', sans-serif; font-size: 18px; line-height: 1.5; color: #fff; margin-bottom: 25px; }
        
        .choices { display: grid; gap: 12px; }
        .choice { 
            display: flex; align-items: center; padding: 16px; background: var(--surface-light); 
            border: 1px solid transparent; border-radius: 10px; cursor: pointer; 
            transition: 0.2s; color: var(--text); font-family: inherit; font-size: 14px; text-align: left;
        }
        .choice:hover:not(.disabled) { border-color: var(--accent); background: rgba(124, 106, 255, 0.08); }
        .choice.correct { border-color: var(--correct); background: rgba(45, 255, 158, 0.08); color: var(--correct); }
        .choice.wrong { border-color: var(--wrong); background: rgba(255, 77, 109, 0.08); color: var(--wrong); }

        .explanation { margin-top: 20px; padding: 15px; background: rgba(106,255,212,0.05); border-radius: 8px; color: var(--accent3); font-size: 13px; border-left: 2px solid var(--accent3); }

        .btn { display: inline-flex; align-items: center; gap: 10px; padding: 14px 32px; border-radius: 10px; font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; border: none; transition: 0.3s; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); }
        .btn-small { padding: 8px 16px; font-size: 11px; }

        .hidden { display: none !important; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        .result-circle { 
            width: 120px; height: 120px; border-radius: 50%; border: 3px solid var(--accent);
            display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;
            font-family: 'Syne', sans-serif; font-size: 32px; font-weight: 800; color: #fff;
            box-shadow: 0 0 20px var(--accent-glow);
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div id="welcome-screen">
        <h1 class="welcome-title">Quiz Engine</h1>
        <p class="welcome-sub">Prêt pour votre session d'étude ?</p>
        <button class="btn btn-primary" onclick="initApp()">Lancer l'application →</button>
    </div>

    <div class="container">
        <div class="header">
            <span class="badge">Session Active</span>
            <h1 id="main-title">Chargement...</h1>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('quiz')">Quiz</button>
            <button class="tab" onclick="switchTab('exos')">Exercices</button>
            <button class="tab" onclick="switchTab('import')">🔧 Config</button>
        </div>

        <div id="view-quiz">
            <div id="quiz-empty" class="card-lobby">
                <span class="lobby-icon">📥</span>
                <h2 class="lobby-title">Aucune donnée</h2>
                <button class="btn btn-ghost" onclick="document.getElementById('fileInput').click()">Charger un fichier JSON</button>
                <input type="file" id="fileInput" class="hidden" onchange="handleFileUpload(event)">
            </div>

            <div id="quiz-lobby" class="hidden">
                <div class="card-lobby">
                    <span class="lobby-icon">✨</span>
                    <h2 class="lobby-title" id="lobby-name">Quiz Prêt</h2>
                    <p class="lobby-stats" id="lobby-details">-- questions détectées</p>
                    <button class="btn btn-primary" onclick="startQuiz()">Démarrer le quiz</button>
                </div>
            </div>

            <div id="quiz-running" class="hidden">
                <div id="question-container"></div>
                <div style="text-align:center; margin-top:30px;">
                    <button id="btn-next" class="btn btn-primary hidden" onclick="nextQuestion()">Suivant →</button>
                </div>
            </div>

            <div id="quiz-results" class="hidden">
                <div class="result-screen" style="text-align:center">
                    <div class="result-circle" id="score-pct">0%</div>
                    <button class="btn btn-primary" onclick="showLobby()">↺ Recommencer</button>
                </div>
            </div>
        </div>

        <div id="view-exos" class="hidden">
            <div id="exos-list"></div>
        </div>

        <div id="view-import" class="hidden">
            <div class="question-card">
                <p class="q-meta">SYNCHRONISATION</p>
                <div style="display:flex; gap:10px; margin-bottom:20px;">
                    <button class="btn btn-ghost btn-small" onclick="fetchGitHubData()">Forcer Maj GitHub</button>
                    <button class="btn btn-ghost btn-small" style="border-color:var(--wrong); color:var(--wrong);" onclick="clearCache()">Vider la mémoire</button>
                </div>
                <p class="q-meta">IMPORT DIRECT (INSTANTANÉ)</p>
                <textarea id="json-input" style="width:100%; height:150px; background:var(--bg); color:var(--accent3); border:1px solid var(--border); border-radius:10px; padding:15px; font-size:12px; outline:none; font-family:inherit;"></textarea>
                <button class="btn btn-primary" style="margin-top:10px; width:100%;" onclick="manualImport()">Importer & Sauvegarder</button>
            </div>
        </div>
    </div>

    <script>
        let state = {
            data: null,
            currentIdx: 0,
            score: 0,
            audioCtx: null
        };

        function playSound() {
            if (!state.audioCtx) state.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = state.audioCtx.createOscillator();
            const gain = state.audioCtx.createGain();
            osc.frequency.setValueAtTime(400, state.audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(800, state.audioCtx.currentTime + 0.1);
            gain.gain.exponentialRampToValueAtTime(0.01, state.audioCtx.currentTime + 0.2);
            osc.connect(gain); gain.connect(state.audioCtx.destination);
            osc.start(); osc.stop(state.audioCtx.currentTime + 0.2);
        }

        function initApp() {
            document.getElementById('welcome-screen').classList.add('hide');
            // 1. On regarde dans le localStorage
            const saved = localStorage.getItem('quiz_data_cache');
            if (saved) {
                state.data = JSON.parse(saved);
                showLobby();
            } else {
                fetchGitHubData();
            }
        }

        async function fetchGitHubData() {
            try {
                document.getElementById('main-title').textContent = "Sync en cours...";
                const res = await fetch(`https://raw.githubusercontent.com/mathprofr/test-automatisation-QCM/main/quiz.json?t=${Date.now()}`);
                if (res.ok) {
                    state.data = await res.json();
                    saveToCache(state.data);
                    showLobby();
                }
            } catch (e) { alert("GitHub indisponible. Utilisez l'import manuel."); }
        }

        function saveToCache(data) {
            localStorage.setItem('quiz_data_cache', JSON.stringify(data));
        }

        function clearCache() {
            localStorage.removeItem('quiz_data_cache');
            location.reload();
        }

        function showLobby() {
            if (!state.data) return;
            document.getElementById('main-title').textContent = state.data.titre || "Quiz Engine";
            document.getElementById('lobby-name').textContent = state.data.titre || "Quiz Prêt";
            document.getElementById('lobby-details').textContent = `${state.data.questions.length} questions chargées`;
            document.getElementById('quiz-empty').classList.add('hidden');
            document.getElementById('quiz-lobby').classList.remove('hidden');
            document.getElementById('quiz-running').classList.add('hidden');
            document.getElementById('quiz-results').classList.add('hidden');
            renderExos();
        }

        function startQuiz() {
            playSound();
            state.currentIdx = 0; state.score = 0;
            document.getElementById('quiz-lobby').classList.add('hidden');
            document.getElementById('quiz-running').classList.remove('hidden');
            renderQuestion();
        }

        function renderQuestion() {
            const q = state.data.questions[state.currentIdx];
            const container = document.getElementById('question-container');
            document.getElementById('btn-next').classList.add('hidden');
            container.innerHTML = `
                <div class="question-card">
                    <p class="q-meta">QUESTION ${state.currentIdx + 1} / ${state.data.questions.length}</p>
                    <h2 class="q-text">${q.question}</h2>
                    <div class="choices" id="choices-box"></div>
                    <div id="expl" class="explanation hidden">${q.explication || ''}</div>
                </div>`;
            q.choix.forEach((c, i) => {
                const b = document.createElement('button');
                b.className = 'choice';
                b.innerHTML = `<span style="color:var(--accent); font-weight:800; margin-right:10px">${String.fromCharCode(65+i)}</span> ${c}`;
                b.onclick = () => handleAnswer(c, q.reponse, b);
                document.getElementById('choices-box').appendChild(b);
            });
        }

        function handleAnswer(sel, cor, el) {
            const all = document.querySelectorAll('.choice');
            const win = (sel === cor);
            if (win) state.score++;
            all.forEach(b => {
                b.onclick = null; b.classList.add('disabled');
                if (b.innerText.includes(cor)) b.classList.add('correct');
            });
            if (!win) el.classList.add('wrong');
            document.getElementById('expl').classList.remove('hidden');
            document.getElementById('btn-next').classList.remove('hidden');
        }

        function nextQuestion() {
            state.currentIdx++;
            if (state.currentIdx < state.data.questions.length) renderQuestion();
            else {
                document.getElementById('quiz-running').classList.add('hidden');
                document.getElementById('quiz-results').classList.remove('hidden');
                document.getElementById('score-pct').textContent = Math.round((state.score/state.data.questions.length)*100) + "%";
            }
        }

        function switchTab(t) {
            document.querySelectorAll('.tab').forEach((el, i) => el.classList.toggle('active', ['quiz','exos','import'][i] === t));
            document.getElementById('view-quiz').classList.toggle('hidden', t !== 'quiz');
            document.getElementById('view-exos').classList.toggle('hidden', t !== 'exos');
            document.getElementById('view-import').classList.toggle('hidden', t !== 'import');
        }

        function renderExos() {
            const el = document.getElementById('exos-list');
            if (!state.data.exercices) { el.innerHTML = ""; return; }
            el.innerHTML = state.data.exercices.map((ex, i) => `
                <div class="question-card" style="margin-bottom:15px">
                    <p class="q-meta">EXERCICE ${i+1}</p>
                    <p class="q-text" style="font-size:15px">${ex.enonce}</p>
                    <details><summary style="cursor:pointer; color:var(--accent3); font-size:12px">VOIR CORRIGÉ</summary>
                    <div style="margin-top:10px; font-size:14px; color:var(--muted)">${ex.corrige}</div></details>
                </div>`).join('');
        }

        function manualImport() {
            try {
                const raw = document.getElementById('json-input').value;
                state.data = JSON.parse(raw);
                saveToCache(state.data);
                showLobby(); switchTab('quiz');
            } catch(e) { alert("JSON Invalide"); }
        }

        function handleFileUpload(e) {
            const fr = new FileReader();
            fr.onload = () => { state.data = JSON.parse(fr.result); saveToCache(state.data); showLobby(); };
            fr.readAsText(e.target.files[0]);
        }
    </script>
</body>
</html>
