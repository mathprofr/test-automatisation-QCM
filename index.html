<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Engine - Version Originale Stable</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050508; --surface: #0f0f17; --accent: #7c6aff;
            --text: #e8e8f0; --muted: #6b6b80; --correct: #2dff9e;
            --wrong: #ff4d6d; --border: rgba(124, 106, 255, 0.15);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; min-height: 100vh; }
        .container { max-width: 720px; margin: 0 auto; padding: 40px 20px; }
        .header { text-align: center; margin-bottom: 30px; font-family: 'Syne'; }
        .q-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 25px; margin-bottom: 20px; }
        .choices { display: grid; gap: 10px; margin-top: 20px; }
        .choice { 
            display: block; width: 100%; padding: 15px; 
            background: #161621; border: 1px solid transparent; 
            border-radius: 10px; cursor: pointer; color: var(--text); 
            font-family: inherit; text-align: left; transition: 0.2s;
        }
        .choice:hover:not(:disabled) { border-color: var(--accent); }
        .choice.correct { border-color: var(--correct) !important; background: rgba(45, 255, 158, 0.1) !important; color: var(--correct); }
        .choice.wrong { border-color: var(--wrong) !important; background: rgba(255, 77, 109, 0.1) !important; color: var(--wrong); }
        .btn { 
            padding: 12px 25px; border-radius: 8px; border: none; 
            background: var(--accent); color: white; font-weight: 700; 
            cursor: pointer; font-family: 'Syne'; margin-top: 15px;
        }
        .hidden { display: none !important; }
        .expl { margin-top: 15px; padding: 15px; background: rgba(124, 106, 255, 0.05); border-left: 3px solid var(--accent); font-size: 13px; color: #6affd4; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1 id="quiz-title">Chargement du Quiz...</h1>
        </div>

        <div id="quiz-app">
            <div id="question-area"></div>
            <div style="text-align:center">
                <button id="next-btn" class="btn hidden" onclick="nextQuestion()">Question Suivante</button>
            </div>
        </div>

        <div id="result-area" class="hidden" style="text-align:center">
            <div class="q-card">
                <h2 style="font-family:Syne">Terminé !</h2>
                <p id="final-score" style="font-size:32px; color:var(--accent); margin:20px 0"></p>
                <button class="btn" onclick="location.reload()">Recommencer</button>
            </div>
        </div>
    </div>

    <script>
        let quizData = null;
        let currentIdx = 0;
        let score = 0;
        let audioCtx = null;

        // --- SONS (Volume boosté à 0.8) ---
        function playSfx(type) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const master = audioCtx.createGain();
            master.gain.setValueAtTime(0.8, audioCtx.currentTime); // VOLUME AUGMENTÉ
            master.connect(audioCtx.destination);

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(master);

            if (type === 'correct') {
                osc.frequency.setValueAtTime(520, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1000, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
                osc.start(); osc.stop(audioCtx.currentTime + 0.2);
            } 
            else if (type === 'wrong') {
                osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(100, audioCtx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            } 
            else if (type === 'end') {
                const notes = [523, 659, 783, 1046];
                notes.forEach((f, i) => {
                    const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                    o.connect(g); g.connect(master);
                    o.frequency.setValueAtTime(f, audioCtx.currentTime + (i*0.1));
                    g.gain.setValueAtTime(0.3, audioCtx.currentTime + (i*0.1));
                    o.start(audioCtx.currentTime + (i*0.1)); o.stop(audioCtx.currentTime + (i*0.1) + 0.4);
                });
            }
        }

        // --- LOGIQUE ---
        const URL = "https://raw.githubusercontent.com/mathprofr/test-automatisation-QCM/main/quiz.json";

        async function loadQuiz() {
            try {
                const response = await fetch(URL + "?t=" + Date.now());
                quizData = await response.json();
                document.getElementById('quiz-title').innerText = quizData.titre;
                renderQuestion();
            } catch (e) {
                document.getElementById('quiz-title').innerText = "Erreur de chargement";
            }
        }

        function renderQuestion() {
            const q = quizData.questions[currentIdx];
            const area = document.getElementById('question-area');
            document.getElementById('next-btn').classList.add('hidden');

            let html = `
                <div class="q-card">
                    <p style="color:var(--muted); font-size:12px; margin-bottom:10px">Question ${currentIdx + 1} / ${quizData.questions.length}</p>
                    <h2 style="font-family:Syne; line-height:1.4">${q.question}</h2>
                    <div class="choices">
            `;

            q.choix.forEach(choix => {
                html += `<button class="choice" onclick="checkAnswer(this, '${choix.replace(/'/g, "\\'")}')">${choix}</button>`;
            });

            html += `</div><div id="explanation" class="expl hidden">${q.explication}</div></div>`;
            area.innerHTML = html;
        }

        function checkAnswer(btn, selectedText) {
            const q = quizData.questions[currentIdx];
            const correctText = q.reponse;
            const allBtns = document.querySelectorAll('.choice');
            
            // On désactive tout
            allBtns.forEach(b => b.disabled = true);

            // Comparaison simple et directe
            if (selectedText === correctText) {
                btn.classList.add('correct');
                score++;
                playSfx('correct');
            } else {
                btn.classList.add('wrong');
                playSfx('wrong');
                // On montre quand même la bonne réponse
                allBtns.forEach(b => {
                    if (b.innerText === correctText) b.classList.add('correct');
                });
            }

            document.getElementById('explanation').classList.remove('hidden');
            document.getElementById('next-btn').classList.remove('hidden');
        }

        function nextQuestion() {
            currentIdx++;
            if (currentIdx < quizData.questions.length) {
                renderQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('quiz-app').classList.add('hidden');
            document.getElementById('result-area').classList.remove('hidden');
            document.getElementById('final-score').innerText = `Score : ${score} / ${quizData.questions.length}`;
            playSfx('end');
        }

        loadQuiz();
    </script>
</body>
</html>
